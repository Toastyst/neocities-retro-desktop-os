<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint</title>
    <style>
        body { font-family: Arial, sans-serif; background: #C0C0C0; margin: 0; padding: 10px; }
        canvas { border: 2px inset #808080; background: #FFFFFF; cursor: crosshair; }
        .tools { margin-bottom: 10px; }
        button { margin: 0 5px; padding: 4px 8px; background: #C0C0C0; border: 2px outset #FFFFFF; }
        .color-picker { display: inline-block; width: 20px; height: 20px; border: 1px solid #000; margin: 0 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="tools">
        <button id="clear">Clear</button>
        <div class="color-picker" id="black" style="background: #000000;"></div>
        <div class="color-picker" id="red" style="background: #FF0000;"></div>
        <div class="color-picker" id="blue" style="background: #0000FF;"></div>
        <div class="color-picker" id="green" style="background: #00FF00;"></div>
    </div>
    <canvas id="paint-canvas" width="400" height="300"></canvas>
    <script>
        const canvas = document.getElementById('paint-canvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clear');

        let isDrawing = false;
        let currentColor = '#000000';

        // Color pickers
        document.querySelectorAll('.color-picker').forEach(picker => {
            picker.addEventListener('click', () => {
                currentColor = picker.style.background;
                document.querySelectorAll('.color-picker').forEach(p => p.style.border = '1px solid #000');
                picker.style.border = '2px solid #FFF';
            });
        });

        // Drawing
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        function startDrawing(e) {
            isDrawing = true;
            draw(e);
        }

        function draw(e) {
            if (!isDrawing) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.fillStyle = currentColor;
            ctx.fillRect(x - 2, y - 2, 4, 4);
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // Clear canvas
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // Initialize
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        document.getElementById('black').style.border = '2px solid #FFF';
    </script>
</body>
</html>
